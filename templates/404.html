{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="error-page">
  <div>
    <div class="error-code">404</div>
    <h2 style="color:var(--primary);font-weight:800;">Page Not Found</h2>
    <p class="text-muted mb-4">The page you're looking for has wandered off somewhere!</p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
        <i class="fas fa-home me-2"></i>Back to Home
      </a>
      <a href="{{ url_for('plan') }}" class="btn btn-secondary btn-lg">
        <i class="fas fa-magic me-2"></i>Plan a Trip
      </a>
    </div>
  </div>
</div>
{% endblock %}
